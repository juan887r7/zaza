    <script>
        function moverCarrusel(d) { document.getElementById('contenedor-carrusel').scrollBy({left:d,behavior:'smooth'}); }
        function selTalla(btn) {
            btn.closest('.tallas-grupo').querySelectorAll('.talla-btn').forEach(b=>b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        function comprarUltimo(btn, producto, tel) {
            const card = btn.closest('.ultimo-ind');
            const talla = card.querySelector('.talla-btn.selected');
            if (card.querySelector('.tallas-grupo') && !talla) { alert('Por favor selecciona una talla.'); return; }
            const msg = talla ? `Hola ZazaStore, me interesa: ${producto} - Talla: ${talla.textContent}` : `Hola ZazaStore, me interesa: ${producto}`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
